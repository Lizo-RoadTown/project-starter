# render.yaml — deploys the demo site as a Render Static Site.
#
# To deploy:
#   1. Push this repo to GitHub.
#   2. In the Render dashboard, "New +" → "Blueprint" → point at this repo.
#   3. Render reads this file and creates the static site automatically.
#
# Static Sites on Render are free, served from a global CDN, and auto-deploy
# on every push to `main`.

services:
  - type: web
    name: project-starter-site
    runtime: static
    # No build step — site/ is already static HTML + CSS + SVG.
    buildCommand: ""
    staticPublishPath: ./site
    # Optional: pretty URLs (drops .html from links). Safe to leave on.
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      # SPA-style fallback isn't needed (no client routing); keep clean URLs only.
      - type: rewrite
        source: /
        destination: /index.html

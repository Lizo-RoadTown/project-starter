<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">project-starter</title>
  <desc id="desc">Day-1 scaffolding for Claude Code projects. Four-layer agent stack: auto-memory, MCP servers, skills, built-ins. Two variants: ui-app and agent-app.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.4">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <!-- title block -->
  <g transform="translate(70, 70)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="44" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">
      project-starter
    </text>
    <text y="38" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="20" fill="#94a3b8">
      Day-1 scaffolding for Claude Code projects.
    </text>
  </g>

  <!-- layered stack (left side) -->
  <g transform="translate(70, 220)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
    <!-- glow behind stack -->
    <rect x="-10" y="-10" width="540" height="380" rx="16" fill="url(#accent)" opacity="0.08" filter="url(#soft)"/>

    <!-- Layer 4 — built-ins -->
    <g transform="translate(0, 0)">
      <rect width="520" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="32" fill="#f1f5f9" font-weight="600">Built-in capabilities</text>
      <text x="24" y="58" fill="#94a3b8" font-size="14">plan mode · todos · Explore agent · web</text>
    </g>

    <!-- Layer 3 — skills -->
    <g transform="translate(0, 95)">
      <rect width="520" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="32" fill="#f1f5f9" font-weight="600">Skills</text>
      <text x="24" y="58" fill="#94a3b8" font-size="14">concise-planning · code-reviewer · ui-ux-pro-max · claude-api</text>
    </g>

    <!-- Layer 2 — MCP servers -->
    <g transform="translate(0, 190)">
      <rect width="520" height="80" rx="10" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
      <text x="24" y="32" fill="#f1f5f9" font-weight="600">MCP servers <tspan fill="#7dd3fc" font-size="13">(pinned in .mcp.json)</tspan></text>
      <text x="24" y="58" fill="#94a3b8" font-size="14">Serena · Context7 · GitHub</text>
    </g>

    <!-- Layer 1 — auto-memory -->
    <g transform="translate(0, 285)">
      <rect width="520" height="80" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <text x="24" y="32" fill="#f1f5f9" font-weight="600">Auto-memory <tspan fill="#a78bfa" font-size="13">(persistence backbone)</tspan></text>
      <text x="24" y="58" fill="#94a3b8" font-size="14">user · feedback · project · reference</text>
    </g>
  </g>

  <!-- variants (right side) -->
  <g transform="translate(690, 220)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">VARIANTS</text>

    <!-- ui-app card -->
    <g transform="translate(0, 30)">
      <rect width="440" height="160" rx="14" fill="#0f1a30" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="22" font-weight="700" fill="#7dd3fc">ui-app</text>
      <text x="24" y="70" font-size="15" fill="#cbd5e1">Next.js · consumer web · dashboards</text>
      <line x1="24" y1="88" x2="416" y2="88" stroke="#1e293b"/>
      <text x="24" y="114" font-size="13" fill="#94a3b8">+ design-system · onboarding-psychologist</text>
      <text x="24" y="134" font-size="13" fill="#94a3b8">+ UX_CONTRACT.md (gates every UI PR)</text>
    </g>

    <!-- agent-app card -->
    <g transform="translate(0, 205)">
      <rect width="440" height="160" rx="14" fill="#0f1a30" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="22" font-weight="700" fill="#a78bfa">agent-app</text>
      <text x="24" y="70" font-size="15" fill="#cbd5e1">LLM agents · Claude API apps</text>
      <line x1="24" y1="88" x2="416" y2="88" stroke="#1e293b"/>
      <text x="24" y="114" font-size="13" fill="#94a3b8">+ ai-agents-architect · agent-memory-systems</text>
      <text x="24" y="134" font-size="13" fill="#94a3b8">+ portable identity discipline</text>
    </g>
  </g>

  <!-- connector arrows from stack to variants -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <path d="M610 260 Q650 260 690 280" marker-end="url(#arrow)"/>
    <path d="M610 480 Q650 480 690 440" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- footer -->
  <g transform="translate(70, 580)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#64748b">
    <text>github.com/Lizo-RoadTown/project-starter</text>
    <text x="1060" text-anchor="end">Apache 2.0</text>
  </g>
</svg>

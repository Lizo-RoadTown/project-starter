<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">project-starter</title>
  <desc id="desc">Day-1 scaffolding for Claude Code projects.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.35">
    <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800 M0 500 H800 M0 600 H800 M0 700 H800"/>
    <path d="M100 0 V800 M200 0 V800 M300 0 V800 M400 0 V800 M500 0 V800 M600 0 V800 M700 0 V800"/>
  </g>

  <!-- title -->
  <g transform="translate(60, 100)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="44" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">
      project-starter
    </text>
    <text y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="20" fill="#94a3b8">
      Day-1 scaffolding for
    </text>
    <text y="62" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="20" fill="#94a3b8">
      Claude Code projects.
    </text>
  </g>

  <!-- stacked layers -->
  <g transform="translate(60, 260)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
    <rect x="-10" y="-10" width="700" height="430" rx="20" fill="url(#accent)" opacity="0.06" filter="url(#soft)"/>

    <g transform="translate(0, 0)">
      <rect width="680" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="28" y="36" fill="#f1f5f9" font-weight="600">Built-in capabilities</text>
      <text x="28" y="64" fill="#94a3b8" font-size="14">plan mode · todos · Explore agent · web</text>
    </g>

    <g transform="translate(0, 105)">
      <rect width="680" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
      <text x="28" y="36" fill="#f1f5f9" font-weight="600">Skills</text>
      <text x="28" y="64" fill="#94a3b8" font-size="14">concise-planning · code-reviewer · ui-ux-pro-max</text>
    </g>

    <g transform="translate(0, 210)">
      <rect width="680" height="90" rx="12" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
      <text x="28" y="36" fill="#f1f5f9" font-weight="600">MCP servers</text>
      <text x="28" y="64" fill="#94a3b8" font-size="14">Serena · Context7 · GitHub</text>
    </g>

    <g transform="translate(0, 315)">
      <rect width="680" height="90" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <text x="28" y="36" fill="#f1f5f9" font-weight="600">Auto-memory</text>
      <text x="28" y="64" fill="#94a3b8" font-size="14">persistent context across every session</text>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(60, 740)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#64748b">
    <text>Lizo-RoadTown/project-starter</text>
    <text x="680" text-anchor="end" fill="#7dd3fc">ui-app · agent-app</text>
  </g>
</svg>

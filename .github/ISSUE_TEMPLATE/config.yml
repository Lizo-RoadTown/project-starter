blank_issues_enabled: false
contact_links:
  - name: Question about Claude Code itself
    url: https://github.com/anthropics/claude-code/issues
    about: For Claude Code bugs/features not specific to this project's templates, file with Anthropic.
  - name: Question about the Agent Skills standard
    url: https://github.com/agentskills/agentskills/discussions
    about: Questions about the open SKILL.md format itself belong on the agentskills.io project.
  - name: Security vulnerability
    url: https://github.com/Lizo-RoadTown/project-starter/security/advisories/new
    about: Report security issues privately. See SECURITY.md.
  - name: Skill not installed when Claude tries to use it
    url: https://github.com/Lizo-RoadTown/claude-skills-marketplace/issues
    about: For Lizo-authored skills (onboarding-psychologist, ai-agents-architect), file in the marketplace repo.

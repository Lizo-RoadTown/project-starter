<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="s" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset=".45" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="h" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity=".55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tl" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="bl" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="br" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0b1220"/>
  <!-- halo -->
  <circle cx="32" cy="48" r="12" fill="url(#h)"/>
  <!-- trunk -->
  <path d="M32 46 C 31 36, 33 28, 32 20" stroke="url(#tl)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- branches -->
  <path d="M32 20 C 26 14, 18 12, 12 8" stroke="url(#bl)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M32 20 C 38 14, 46 12, 52 8" stroke="url(#br)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- seed -->
  <ellipse cx="32" cy="48" rx="4" ry="5.5" fill="url(#s)"/>
  <!-- tips -->
  <circle cx="12" cy="8" r="2.5" fill="#7dd3fc"/>
  <circle cx="52" cy="8" r="2.5" fill="#a78bfa"/>
